<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#151008" />
  <meta name="description" content="Lore — know the lore. A curated 2-day guide to Center City Philadelphia." />
  <title>Lore · Philadelphia</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" data-theme="A">

    <!-- ============ DESKTOP SIDEBAR ============ -->
    <aside class="sidebar">
      <div class="sb-logo">
        <div class="logo-row">
          <span class="logo-mark" data-logo></span>
          <div>
            <div class="logo-word">lore</div>
            <div class="logo-tag">Know the lore.</div>
          </div>
        </div>
        <div class="city-card">
          <div class="city-name">Philadelphia</div>
          <div class="city-dates">Tue Jun 30 – Wed Jul 1, 2026 · Center City</div>
        </div>
      </div>

      <nav class="sb-nav" id="sb-nav"></nav>

      <div class="sb-scroll">
        <div class="sb-group">
          <span class="sb-label">Theme</span>
          <div class="theme-toggle" id="theme-toggle">
            <button data-theme-btn="A" class="on">Warm</button>
            <button data-theme-btn="B">Dark</button>
          </div>
        </div>

        <div class="sb-group">
          <span class="sb-label">Your location</span>
          <button class="sb-locate" id="sb-locate">📍 Find places near me</button>
          <input class="sb-addr" id="sb-addr" type="text" placeholder="…or type a hotel / address" autocomplete="off" />
          <p class="sb-locstatus" id="sb-locstatus" hidden></p>
        </div>

        <div class="sb-group">
          <span class="sb-label">Search</span>
          <input class="sb-addr" id="sb-q" type="search" placeholder="🔍 Search places…" autocomplete="off" />
        </div>

        <div class="sb-group">
          <span class="sb-label">Day</span>
          <div class="sb-seg" id="sb-day"></div>
        </div>

        <div class="sb-group">
          <span class="sb-label">Curated by</span>
          <div class="sb-seg" id="sb-src"></div>
        </div>

        <div class="sb-group">
          <span class="sb-label">Category</span>
          <select class="sb-select" id="sb-cat"></select>
        </div>

        <div class="sb-group">
          <span class="sb-label">Cuisine</span>
          <select class="sb-select" id="sb-cuisine"></select>
        </div>
      </div>
    </aside>

    <!-- ============ MAIN ============ -->
    <div class="main-wrap">
      <!-- Mobile hero header -->
      <header class="hero">
        <div class="hero-top">
          <span class="logo-mark gold" data-logo></span>
          <span class="hero-logoword">LORE</span>
          <button class="hero-theme" id="hero-theme" aria-label="Toggle theme">◑</button>
        </div>
        <h1 class="hero-city">Philadelphia</h1>
        <div class="hero-dates">Tue Jun 30 – Wed Jul 1, 2026 · Center City</div>
        <div class="hero-days sb-seg" id="hero-day"></div>
      </header>

      <main id="screen"></main>
    </div>

    <!-- ============ DETAIL (desktop panel / mobile takeover) ============ -->
    <aside id="detail" class="detail">
      <div id="detail-body"></div>
    </aside>
    <div id="detail-scrim" class="detail-scrim"></div>

    <!-- ============ MOBILE BOTTOM NAV ============ -->
    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
